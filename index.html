<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنشآت</title>
    
    <!-- مكتبات خارجية -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="images/logo.png" alt="شعار وزارة الأوقاف والإرشاد" class="logo">
        </div>
    </header>

    <main>
        <h1>تفاصيل المنشآت</h1>
        <input type="text" id="searchInput" placeholder="أدخل اسم المنشأة" aria-label="بحث عن المنشأة">
        <div class="action-buttons">
            <button onclick="searchCompany()" title="ابحث عن المنشأة">
                <i class="fas fa-search"></i> بحث
            </button>
            <button id="btnReset" onclick="resetSearch()" title="إعادة تعيين">
                <i class="fas fa-undo"></i> إعادة تعيين
            </button>
        </div>
        <div id="progressBar" class="progress" style="display: none;">
            <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;"></div>
        </div>

        <div id="results" class="mt-4"></div>

        <div id="hajResults" class="mt-4"></div>

        <!-- التحكم في الصفوف وزر التصدير -->
        <div id="hajResultsControls" class="mt-3" style="display: none; justify-content: space-between; align-items: center;">
            <select id="rowsPerPage" class="form-control rows-selector" onchange="updateTableRows()">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <div class="export-btn-container">
                <button class="btn btn-secondary" onclick="exportToExcel()">تصدير إلى Excel</button>
                <button class="btn btn-secondary" onclick="exportToPDF()">تصدير إلى PDF</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 وزارة الأوقاف والإرشاد. جميع الحقوق محفوظة.</p>
        <p>الإدارة العامة للنظم والمسار الإلكتروني</p>
    </footer>

    <!-- مكتبات JavaScript الخارجية -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="js/scripts.js" defer></script>
</body>
</html>
